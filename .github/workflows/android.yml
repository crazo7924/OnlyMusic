name: Android CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - '*'

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v6
    
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload debug APK
      if: success() && github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v6
      with:
        name: debug-apk
        path: |
          app/build/outputs/apk/**/debug/*.apk
          **/build/outputs/apk/**/debug/*.apk

    - name: Extract package name and prepare APK
      if: success() && startsWith(github.ref, 'refs/tags/')
      id: apk_info
      run: |
        # Extract package name from build.gradle.kts or build.gradle
        PACKAGE_NAME=$(grep -oP "applicationId\s*=\s*['\"]?\K[^'\"]*" app/build.gradle.kts || grep -oP "applicationId\s+['\"]?\K[^'\"]*" app/build.gradle || echo "com.example.app")
        TAG_NAME=${GITHUB_REF#refs/tags/}
        
        # Find APK and rename it
        APK_PATH=$(find app/build/outputs/apk -name "*debug.apk" | head -1)
        if [ ! -z "$APK_PATH" ]; then
          NEW_NAME="${PACKAGE_NAME}_${TAG_NAME}-debug.apk"
          mv "$APK_PATH" "app/build/outputs/apk/$NEW_NAME"
          echo "apk_path=app/build/outputs/apk/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      if: success() && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.apk_info.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
